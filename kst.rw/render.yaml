# databases:
#   - name: kst-db-prod
#     databaseName: kst_db
#     user: kst_admin
#     plan: free

services:
  # 1. Backend API
  - type: web
    name: kst-backend
    runtime: docker
    dockerContext: ./kst-backend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # Neon.tech Connection String
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_hJdj0ZKqgR5v@ep-fragrant-firefly-ahhqfjb9-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require
      # Option B: Use this if you want Render to link it automatically (requires deleting your other free DB first)
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: kst-db-prod
      #     property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3005

  # 2. Public Frontend
  - type: web
    name: kst-frontend-public
    runtime: docker
    dockerContext: ./kst-frontend
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        # In production, this should be the public URL of the backend
        # e.g., https://kst-backend.onrender.com/api
        value: https://kst-backend.onrender.com/api

  # 3. Admin Portal
  - type: web
    name: kst-admin-portal
    runtime: docker
    dockerContext: ./admin-kst
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://kst-backend.onrender.com/api
