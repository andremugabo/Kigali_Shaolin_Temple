services:
  database:
    image: postgres:15-alpine
    container_name: kst-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-kst_db}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kst_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - kst-db-data:/var/lib/postgresql/data

  backend:
    build: ./kst-backend
    container_name: kst-backend
    ports:
      - "3005:3005"
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-postgres}
      - DB_NAME=${DB_NAME:-kst_db}
      - PORT=3005
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./kst-backend/uploads:/app/uploads

  frontend:
    build: ./kst-frontend
    container_name: kst-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3005/api
      - VITE_UPLOAD_URL=http://localhost:3005
    depends_on:
      - backend

  admin:
    build: ./admin-kst
    container_name: kst-admin
    ports:
      - "8081:80"
    environment:
      - VITE_API_URL=http://localhost:3005/api
    depends_on:
      - backend

volumes:
  kst-db-data:
